<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Hydra Sublenguaje</title>
  <script src="https://unpkg.com/hydra-synth"></script>
  <style>
	html, body {
  	margin: 0;
  	padding: 0;
  	overflow: hidden;
  	height: 100%;
  	background: black;
	}

	canvas {
  	position: fixed;
  	top: 0;
  	left: 0;
  	width: 100vw;
  	height: 100vh;
  	z-index: 0;
	}

	#input {
  	position: fixed;
  	bottom: 20px;
  	left: 50%;
  	transform: translateX(-50%);
  	width: 80%;
  	max-width: 600px;
  	height: 80px;
  	background: rgba(0, 0, 0, 0.5);
  	color: white;
  	font-size: 18px;
  	border: 2px solid white;
  	border-radius: 10px;
  	padding: 10px;
  	z-index: 10;
  	backdrop-filter: blur(4px);
  	resize: none;
	}

	/* Botón de palabras - estilo sobrio */
	#wordButton {
  	position: fixed;
  	top: 20px;
  	right: 20px;
  	background: rgba(0, 0, 0, 0.6);
  	color: rgba(255, 255, 255, 0.7);
  	border: 1px solid rgba(255, 255, 255, 0.3);
  	border-radius: 4px;
  	padding: 6px 12px;
  	font-size: 12px;
  	cursor: pointer;
  	z-index: 20;
  	backdrop-filter: blur(4px);
  	transition: all 0.2s ease;
  	font-family: monospace;
  	letter-spacing: 0.5px;
	}

	#wordButton:hover {
  	background: rgba(0, 0, 0, 0.8);
  	color: white;
  	border-color: rgba(255, 255, 255, 0.6);
	}

	/* Panel desplegable - estilo sobrio */
	#wordPanel {
  	position: fixed;
  	top: 60px;
  	right: 20px;
  	background: rgba(0, 0, 0, 0.85);
  	backdrop-filter: blur(8px);
  	border: 1px solid rgba(255, 255, 255, 0.2);
  	border-radius: 4px;
  	padding: 12px;
  	z-index: 20;
  	min-width: 200px;
  	max-width: 280px;
  	max-height: 70vh;
  	overflow-y: auto;
  	display: none;
  	font-family: monospace;
  	color: #ccc;
  	font-size: 12px;
	}

	#wordPanel.show {
  	display: block;
	}

	#wordPanel h3 {
  	margin: 0 0 10px 0;
  	text-align: left;
  	color: #aaa;
  	font-size: 11px;
  	font-weight: normal;
  	letter-spacing: 1px;
  	border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  	padding-bottom: 5px;
	}

	.word-list {
  	display: flex;
  	flex-direction: column;
  	gap: 4px;
	}

	.word-item {
  	padding: 4px 0;
  	color: #aaa;
  	font-size: 11px;
  	border-bottom: 1px solid rgba(255, 255, 255, 0.05);
	}

	.word-name {
  	color: #ddd;
  	font-weight: normal;
	}

	.close-panel {
  	position: absolute;
  	top: 8px;
  	right: 10px;
  	cursor: pointer;
  	font-size: 14px;
  	color: #888;
  	background: none;
  	border: none;
  	font-weight: normal;
  	padding: 0;
  	line-height: 1;
	}

	.close-panel:hover {
  	color: #fff;
	}

	/* Scrollbar sobria */
	#wordPanel::-webkit-scrollbar {
  	width: 4px;
	}

	#wordPanel::-webkit-scrollbar-track {
  	background: rgba(255, 255, 255, 0.05);
	}

	#wordPanel::-webkit-scrollbar-thumb {
  	background: rgba(255, 255, 255, 0.2);
	}

	#wordPanel::-webkit-scrollbar-thumb:hover {
  	background: rgba(255, 255, 255, 0.3);
	}
  </style>
</head>
<body>
  <button id="wordButton">palabras</button>
 
  <div id="wordPanel">
	<button class="close-panel" id="closePanel">✕</button>
	<h3>PALABRAS DISPONIBLES</h3>
	<div class="word-list" id="wordList"></div>
  </div>

  <textarea id="input" placeholder="Escribe palabras: paco, mestizo, a, b, c..."></textarea>

  <script>
	const hydra = new Hydra({ detectAudio: false });

	const palabras = {
  	obsessed: () => gradient([6,8,4,5,10,7]).colorama().mult(osc(99)).kaleid(199),
  	microplastics: () =>  osc(26.522,1.061,-3.628).mask(gradient(5.999,3.755,-0.002)).modulateRepeat(voronoi(99,0.031,0.002),0.919,0.41).scale([.8,.6,.5,0.662]).modulateKaleid(noise([1.07, 0.956])).modulateRepeatY(shape([0.04,0.03,0.05,0.09].fast(0.001)),1,0),
  	rockstar: () => osc(29,-.001, 3.628).modulateRepeat(shape(4, 0.6,0.6), 6, 3,.8).modulatePixelate(voronoi(13, 0.1), 34.965, 0.049).blend(voronoi(20,1,0.1),2).mult(noise(22,0.6),1).kaleid(5).scale(1.3),
  	honeysuckle: () => osc(50, 0.5).color(1,1,0).mask(shape(6,.3, 0.01)).modulatePixelate(noise(0.9, 0.5),50).mask(shape(6,0.5,0.5),8,.1).modulateRepeat(shape(4,2),6,4,1,1.6).kaleid(6).rotate(() => mouse.x * 0.02),
  	pretty: () => osc(10, 0.01, 1).color(1, 0.1, 0.3).kaleid(2).modulate(noise(3, 0.1)).modulateRotate(osc(9),1,()=> mouse.y),
  	fem: () => voronoi(()=>a.fft[0]*30).kaleid(5,5).modulateRepeat(shape(4,0,3),50,50,5,8).rotate(5).add(osc(30,0.1,1.5).kaleid(()=>a.fft[1]*10+3).mask(shape(55,1,80))),
  	o: () => osc(9,0.1).kaleid(4,4).modulateRepeat(shape(4,4,4),35,30,5,5)  	},
	};

	const input = document.getElementById("input");

	input.addEventListener("input", () => {
  	const texto = input.value.toLowerCase().trim();

  	// Si contiene comas: modulación encadenada
  	if (texto.includes(",")) {
    	const modWords = texto.split(",").map(w => w.trim()).filter(w => palabras[w]);
    	if (modWords.length >= 2) {
      	let base = palabras[modWords[0]]();
      	for (let i = 1; i < modWords.length; i++) {
        	base = palabras[modWords[i]]().modulate(base, 0.5 + 0.3 * Math.random());
      	}
      	base.out();
      	return;
    	}
  	}

  	// Si contiene x: modulación escala
  	if (texto.includes("x")) {
    	const modWords = texto.split("x").map(w => w.trim()).filter(w => palabras[w]);
    	if (modWords.length >= 2) {
      	let base = palabras[modWords[0]]();
      	for (let i = 1; i < modWords.length; i++) {
        	base = palabras[modWords[i]]().modulateScale(base, 0.5 + 0.3 * Math.random());
      	}
      	base.out();
      	return;
    	}
  	}

  	// Si no hay separadores especiales, renderiza todo en capas independientes
  	const entradas = texto.split(/\s+/).map(w => w.trim()).filter(w => palabras[w]);
  	if (entradas.length > 0) {
    	let comp = palabras[entradas[0]]();
    	for (let i = 1; i < entradas.length; i++) {
      	comp = comp.diff(palabras[entradas[i]](), 0.5);
    	}
    	comp.out();
  	}
	});

	// Funcionalidad del botón de palabras - solo visualización
	const wordButton = document.getElementById("wordButton");
	const wordPanel = document.getElementById("wordPanel");
	const closePanel = document.getElementById("closePanel");
	const wordList = document.getElementById("wordList");

	// Generar lista de palabras (solo texto, sin interacción)
	const palabrasKeys = Object.keys(palabras).sort();
    
	palabrasKeys.forEach(palabra => {
  	const wordItem = document.createElement("div");
  	wordItem.className = "word-item";
 	 
  	const wordName = document.createElement("span");
  	wordName.className = "word-name";
  	wordName.textContent = palabra;
 	 
  	wordItem.appendChild(wordName);
  	wordList.appendChild(wordItem);
	});

	// Mostrar/Ocultar panel - se mantiene activo hasta hacer click
	wordButton.addEventListener("click", (e) => {
  	e.stopPropagation();
  	wordPanel.classList.toggle("show");
	});

	closePanel.addEventListener("click", (e) => {
  	e.stopPropagation();
  	wordPanel.classList.remove("show");
	});

	// Cerrar solo si se hace click fuera del panel Y fuera del botón
	document.addEventListener("click", (event) => {
  	if (wordPanel.classList.contains("show") &&
      	!wordPanel.contains(event.target) &&
      	!wordButton.contains(event.target)) {
    	wordPanel.classList.remove("show");
  	}
	});

	// Evitar que el panel se cierre al hacer click dentro de él
	wordPanel.addEventListener("click", (e) => {
  	e.stopPropagation();
	});
  </script>
</body>
</html>
